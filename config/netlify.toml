[build]
  base = "vtt-react"
  publish = "build"
  command = "npm install && npm run build:netlify"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  GENERATE_SOURCEMAP = "false"
  CI = "true"
  NODE_OPTIONS = "--max-old-space-size=8192"
  REACT_APP_BUILD_MODE = "production"
  REACT_APP_ENV = "production"
  INLINE_RUNTIME_CHUNK = "false"
  BROWSERSLIST_ENV = "production"
  REACT_APP_SOCKET_URL = "https://descension-mythrill.up.railway.app"
  # SECURITY: Firebase configuration must be set in Netlify Dashboard
  # Go to: Site settings -> Environment variables
  # Required variables:
  # - REACT_APP_FIREBASE_API_KEY
  # - REACT_APP_FIREBASE_AUTH_DOMAIN
  # - REACT_APP_FIREBASE_PROJECT_ID
  # - REACT_APP_FIREBASE_STORAGE_BUCKET
  # - REACT_APP_FIREBASE_MESSAGING_SENDER_ID
  # - REACT_APP_FIREBASE_APP_ID
  # - REACT_APP_FIREBASE_MEASUREMENT_ID (optional)
  BUILD_TIMESTAMP = "2025-11-26-nodejs-update"

# Redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Allow Firebase Google sign-in popups
    Cross-Origin-Opener-Policy = "unsafe-none"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com https://lh3.googleusercontent.com https://images.unsplash.com; connect-src 'self' https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebase-crashpingsystem.googleapis.com https://firebaseremoteconfig.googleapis.com https://app-measurement.com https://www.google.com wss://descension-mythrill.up.railway.app https://mythrill.netlify.app https://windtunnel.netlify.app; frame-src https://accounts.google.com https://firebaseremoteconfig.googleapis.com; worker-src 'self' blob:;"

# Cache hashed static assets (JS/CSS bundles with content hashes)
[[headers]]
  for = "/static/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache media/assets that change (images, fonts, etc.)
[[headers]]
  for = "/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Ensure index.html is never cached so browsers fetch the latest bundles
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Ensure service worker is never cached so it can update
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Expires = "0"

# All environment variables are configured above in [build.environment]
